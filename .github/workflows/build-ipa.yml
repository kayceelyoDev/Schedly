name: Build iOS IPA for AltStore
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Pod Install
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS App
        run: |
          cd ios
          echo "Building iOS App..."
          # Fix React Native 'node' missing in script phase error
          export NODE_BINARY=$(which node)
          set -o pipefail
          
          xcodebuild -workspace schedly.xcworkspace -scheme schedly -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" PROVISIONING_PROFILE_SPECIFIER="" ENTITLEMENTS_REQUIRED=NO | tee ../build_log.txt
          
      - name: Package into IPA
        if: success()
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv *.app Payload/
          zip -qr ../../../../../Schedly.ipa Payload/

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Schedly-IPA
          path: Schedly.ipa
          retention-days: 7
          
      - name: Extract Errors (If Failed)
        if: failure()
        run: grep -A 2 -B 2 -i "error:" build_log.txt > errors_only.txt || echo "Could not parse errors" > errors_only.txt

      - name: Upload Clean Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Clean-Errors
          path: errors_only.txt
          retention-days: 7
