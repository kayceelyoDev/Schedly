name: Build iOS IPA for AltStore
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Pod Install
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS App
        run: |
          cd ios
          # Dynamically find the workspace and scheme so we don't guess the name
          export WORKSPACE=$(ls | grep "\.xcworkspace$" | head -n 1)
          export SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | grep -A 1 "Information about workspace" | tail -n 1 | xargs)
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package into IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv *.app Payload/
          zip -qr ../../../../../Schedly.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Schedly-IPA
          path: Schedly.ipa
          retention-days: 7
